<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>NiX Garden — 和風庭院</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="canvas-container"></div>

  <div id="hud">

    <div id="title-bar">
      <span id="title-text">🌸 NiX 庭院</span>
      <span id="mode-label">模式：種植</span>
    </div>

    <div id="toolbar">
      <button class="tool-btn active" id="btn-plant" onclick="setMode('plant')">
        <span class="btn-icon">🌱</span>
        <span class="btn-label">種植</span>
      </button>
      <button class="tool-btn" id="btn-build" onclick="setMode('build')">
        <span class="btn-icon">🪑</span>
        <span class="btn-label">家具</span>
      </button>
      <button class="tool-btn" id="btn-delete" onclick="setMode('delete')">
        <span class="btn-icon">🗑️</span>
        <span class="btn-label">移除</span>
      </button>
    </div>

    <div id="info-panel">
      <div class="info-row">🌿 植物: <span id="plant-count">0</span></div>
      <div class="info-row">🪵 家具: <span id="build-count">0</span></div>
    </div>

    <div id="toast" class="hidden"></div>

  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
